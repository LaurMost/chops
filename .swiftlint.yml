# SwiftLint configuration for Chops
# Formatting is owned by SwiftFormat (.swiftformat); SwiftLint focuses on
# correctness and code smells. CI runs `swiftlint lint --strict`, so every
# reported violation (warning or error) must be resolved or tuned here.

included:
  - Chops
  - ChopsTests

excluded:
  - Chops.xcodeproj
  - .build
  - site

disabled_rules:
  # Owned by SwiftFormat — disabling avoids tool conflicts.
  - trailing_comma
  - statement_position
  - opening_brace
  - vertical_whitespace
  # Intentional in this codebase.
  - force_try   # used in test helpers and a few controlled call sites
  - todo        # tracking comments are allowed

line_length:
  warning: 300
  error: 500
  ignores_urls: true
  ignores_comments: true
  ignores_function_declarations: true

identifier_name:
  min_length: 1
  max_length:
    warning: 60
    error: 80
  allowed_symbols: ["_"]

type_name:
  max_length:
    warning: 60
    error: 80

function_body_length:
  warning: 160
  error: 300

type_body_length:
  warning: 1100
  error: 1400

file_length:
  warning: 1200
  error: 1600
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 40
  error: 60

large_tuple:
  warning: 4
  error: 5

nesting:
  type_level: 3
